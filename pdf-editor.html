<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Editor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #canvas {
            border: 1px solid black;
        }
        #textEditInput {
            position: absolute;
            padding: 10px;
            border: 1px solid black;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <input type="file" id="fileInput" accept="application/pdf">
    <canvas id="canvas" width="800" height="600"></canvas>
    <div id="toolbar">
        <button id="eraseBtn">Erase</button>
        <button id="addTextBtn">Add Text</button>
        <button id="saveBtn">Save</button>
        <input type="color" id="colorPicker" value="#000000">
        <input type="number" id="fontSizeInput" value="16" min="6">
    </div>
    <input type="text" id="textEditInput" style="display: none;">
    <script>
        const fileInput = document.getElementById('fileInput');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const eraseBtn = document.getElementById('eraseBtn');
        const addTextBtn = document.getElementById('addTextBtn');
        const saveBtn = document.getElementById('saveBtn');
        const colorPicker = document.getElementById('colorPicker');
        const fontSizeInput = document.getElementById('fontSizeInput');
        const textEditInput = document.getElementById('textEditInput');
        let pdfDoc = null;
        let currentPage = 1;
        let currentTool = 'pen';
        let annotations = [];
        let isDrawing = false;
        let currentPath = [];
        let pdfFile = null;
        let zoom = 1;
        let textInputActive = false;

        fileInput.addEventListener('change', handleFile);

        async function handleFile(e) {
            const file = e.target.files[0];
            if (file && file.type === 'application/pdf') {
                pdfFile = file;
                const url = URL.createObjectURL(file);
                try {
                    const loadingTask = pdfjsLib.getDocument(url);
                    pdfDoc = await loadingTask.promise;
                    await renderPage(1);
                } catch (err) {
                    console.error(err);
                }
            }
        }

        async function renderPage(pageNum = 1) {
            if (!pdfDoc) return;
            currentPage = pageNum;
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: zoom });
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            const renderContext = {
                canvasContext: ctx,
                viewport: viewport
            };
            await page.render(renderContext).promise;
            drawSavedAnnotations();
        }

        function drawSavedAnnotations() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (pdfDoc) {
                renderPage(currentPage);
            }
            annotations.forEach((ann) => {
                if (ann.type === 'text') {
                    ctx.font = `${ann.size}px Arial`;
                    ctx.textBaseline = 'top';
                    ctx.fillStyle = ann.color;
                    ctx.fillText(ann.text, ann.x, ann.y);
                } else if (ann.type === 'eraser') {
                    ctx.fillStyle = 'white';
                    ctx.fillRect(ann.x, ann.y, ann.w, ann.h);
                }
            });
        }

        canvas.addEventListener('mousedown', startAction);
        canvas.addEventListener('mousemove', performAction);
        window.addEventListener('mouseup', endAction);

        function startAction(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            isDrawing = true;
            if (currentTool === 'addText') {
                textEditInput.style.left = x + 'px';
                textEditInput.style.top = y + 'px';
                textEditInput.style.display = 'block';
                textEditInput.focus();
                textInputActive = true;
            } else {
                currentPath = [{ x: x, y: y }];
            }
        }

        function performAction(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            if (currentTool === 'eraser') {

                ctx.fillRect(x, y, 20, 20);
                annotations.push
