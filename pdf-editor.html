<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>DTE Solutions // Document Editor</title>

		<!-- External Libraries -->
		<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
		<script>
			pdfjsLib.GlobalWorkerOptions.workerSrc =
				"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
		</script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

		<style>
			:root {
				--bg-color: #050505;
				--panel-bg: rgba(20, 20, 20, 0.7);
				--accent: #00ff9d;
				--text: #e0e0e0;
				--border: #333;
			}

			body {
				margin: 0;
				padding: 0;
				background-color: var(--bg-color);
				color: var(--text);
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				height: 100vh;
				display: flex;
				flex-direction: column;
				overflow: hidden;
			}

			/* Layout Utilities */
			.flex {
				display: flex;
			}
			.justify-center {
				justify-content: center;
			}
			.justify-between {
				justify-content: space-between;
			}
			.items-center {
				align-items: center;
			}
			.hidden {
				display: none !important;
			}
			.relative {
				position: relative;
			}
			.absolute {
				position: absolute;
			}
			.overflow-hidden {
				overflow: hidden;
			}
			.font-mono {
				font-family: "Courier New", Courier, monospace;
			}
			.p-1 {
				padding: 0.5rem;
			}
			.text-xs {
				font-size: 0.75rem;
			}
			.text-sm {
				font-size: 0.875rem;
			}
			.text-lg {
				font-size: 1.125rem;
			}
			.font-bold {
				font-weight: bold;
			}

			/* Main Components */
			.glass-panel {
				background: var(--panel-bg);
				backdrop-filter: blur(10px);
				border: 1px solid var(--border);
				box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
				border-radius: 8px;
			}

			/* Upload Screen */
			#uploadContainer {
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				z-index: 10;
				background: var(--bg-color);
			}

			.upload-btn {
				background: var(--accent);
				color: black;
				padding: 15px 30px;
				border-radius: 4px;
				cursor: pointer;
				font-weight: bold;
				transition: 0.2s;
				text-transform: uppercase;
				letter-spacing: 1px;
			}
			.upload-btn:hover {
				opacity: 0.8;
			}

			/* Toolbar */
			#toolbar {
				height: 50px;
				border-bottom: 1px solid var(--border);
				padding: 0 1rem;
				gap: 10px;
			}

			.tool-btn {
				background: transparent;
				border: 1px solid var(--border);
				color: var(--text);
				padding: 5px 10px;
				cursor: pointer;
				border-radius: 4px;
				font-size: 0.9rem;
			}
			.tool-btn.active {
				background: var(--accent);
				color: black;
				border-color: var(--accent);
			}

			/* Editor Area */
			#editorContainer {
				flex: 1;
				position: relative;
				display: flex;
				flex-direction: column;
				overflow: hidden;
			}

			#canvasWrapper {
				flex: 1;
				overflow: auto;
				display: flex;
				justify-content: center;
				padding: 20px;
				background: #111;
			}

			canvas {
				box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
				cursor: crosshair;
			}

			/* Text Input Overlay */
			#textEditInput {
				position: absolute;
				background: transparent;
				border: 1px dashed var(--accent);
				outline: none;
				z-index: 100;
				overflow: hidden;
				white-space: nowrap;
				display: none;
			}

			/* Selection Box for Text Area */
			#selectionBox {
				position: absolute;
				border: 1px dashed #fff;
				background: rgba(255, 255, 255, 0.1);
				z-index: 99;
				display: none;
				pointer-events: none;
			}

			/* Status Bar */
			.status-bar {
				height: 30px;
				background: #000;
				border-top: 1px solid var(--border);
				color: #666;
				padding: 0 1rem;
				font-size: 0.8rem;
			}

			/* Instruction Banner */
			.instruction-banner {
				background: #1a1a1a;
				color: #888;
				font-size: 0.8rem;
				padding: 5px 1rem;
				text-align: center;
				border-bottom: 1px solid #333;
			}

			/* Thumbnails */
			#thumbList {
				position: absolute;
				left: 0;
				top: 50px;
				bottom: 30px;
				width: 60px;
				background: #0a0a0a;
				border-right: 1px solid var(--border);
				display: flex;
				flex-direction: column;
				align-items: center;
				padding-top: 10px;
				overflow-y: auto;
				z-index: 5;
			}
			.thumb {
				width: 40px;
				height: 40px;
				border: 1px solid #333;
				margin-bottom: 5px;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 0.7rem;
				color: #555;
				cursor: pointer;
			}
			.thumb:hover {
				border-color: var(--accent);
				color: var(--accent);
			}

			/* Inputs in Toolbar */
			.toolbar-input {
				background: #222;
				border: 1px solid #444;
				color: white;
				padding: 4px;
				border-radius: 3px;
			}
		</style>
	</head>
	<body>
		<!-- Upload Screen -->
		<div id="uploadContainer">
			<h1 class="font-mono text-lg mb-4">DTE DOCUMENT SECURITY</h1>
			<input
				type="file"
				id="fileInput"
				accept="application/pdf"
				style="display: none" />
			<label for="fileInput" class="upload-btn">Initialize Uplink</label>
			<p class="text-sm" style="margin-top: 15px; color: #666">
				Supports PDF v1.4 - 1.7
			</p>
		</div>

		<!-- Main App -->
		<div
			id="app"
			class="hidden"
			style="height: 100%; display: flex; flex-direction: column">
			<!-- Toolbar -->
			<div
				id="toolbar"
				class="flex justify-between items-center glass-panel m-2 mb-0 rounded-none border-b-0">
				<div class="flex items-center gap-2">
					<button class="tool-btn active" data-tool="pen">Pen</button>
					<button class="tool-btn" data-tool="highlight">Highlight</button>
					<button class="tool-btn" data-tool="text">Add Text</button>
					<button class="tool-btn" data-tool="replace">Replace Text</button>
				</div>

				<div class="flex items-center gap-2">
					<input
						type="color"
						id="colorPicker"
						class="toolbar-input"
						value="#00ff9d"
						style="width: 30px; height: 25px; border: none" />
					<input
						type="text"
						id="fontInput"
						class="toolbar-input"
						value="Courier New"
						placeholder="Font" />
					<input
						type="number"
						id="sizeInput"
						class="toolbar-input"
						value="16"
						min="8"
						max="72"
						style="width: 50px" />
					<select id="bgType" class="toolbar-input" style="width: 100px">
						<option value="match">Match BG</option>
						<option value="white">White Mask</option>
						<option value="transparent">Transparent</option>
					</select>
				</div>

				<div class="flex items-center gap-2">
					<button class="tool-btn" id="undoBtn">Undo</button>
					<button class="tool-btn" id="clearBtn">Clear</button>
					<button
						class="tool-btn"
						style="background: var(--accent); color: black; font-weight: bold"
						id="saveBtn">
						💾 Save PDF
					</button>
				</div>
			</div>

			<!-- Instruction Banner -->
			<div class="instruction-banner">
				DRAG TO EDIT: Drag a box over any area to create a text field. Toggle
				"White Mask" to cover existing text. Press Enter to confirm.
			</div>

			<!-- Editor Area -->
			<div
				id="editorContainer"
				style="display: flex; flex: 1; position: relative">
				<!-- Thumbnails -->
				<div id="thumbList"></div>

				<!-- Canvas Area -->
				<div id="canvasWrapper">
					<div
						class="glass-panel relative overflow-hidden flex justify-center bg-black"
						style="min-height: 800px; min-width: 600px">
						<canvas id="pdfCanvas"></canvas>
						<!-- Overlay Elements -->
						<div id="selectionBox"></div>
						<input type="text" id="textEditInput" autocomplete="off" />
					</div>
				</div>
			</div>

			<!-- Status Bar -->
			<footer class="status-bar flex justify-between">
				<span id="statusBar">Ready for document uplink</span>
				<div class="flex gap-4">
					<button class="tool-btn text-xs" onclick="prevPage()">Prev</button>
					<span id="pageCounter" class="font-mono">PAGE 0 / 0</span>
					<button class="tool-btn text-xs" onclick="nextPage()">Next</button>
					<button class="tool-btn text-xs" onclick="zoomOut()">-</button>
					<span id="zoomLabel" class="font-mono text-xs">100%</span>
					<button class="tool-btn text-xs" onclick="zoomIn()">+</button>
				</div>
				<span class="font-mono text-xs">© 2026 DTE Solutions</span>
			</footer>
		</div>

		<script>
			// DOM Elements
			const fileInput = document.getElementById("fileInput");
			const uploadContainer = document.getElementById("uploadContainer");
			const editorContainer = document.getElementById("editorContainer");
			const canvas = document.getElementById("pdfCanvas");
			const ctx = canvas.getContext("2d");
			const toolbar = document.getElementById("toolbar");
			const colorPicker = document.getElementById("colorPicker");
			const fontInput = document.getElementById("fontInput");
			const sizeInput = document.getElementById("sizeInput");
			const bgType = document.getElementById("bgType");
			const saveBtn = document.getElementById("saveBtn");
			const clearBtn = document.getElementById("clearBtn");
			const undoBtn = document.getElementById("undoBtn");
			const thumbList = document.getElementById("thumbList");
			const statusBar = document.getElementById("statusBar");
			const pageCounter = document.getElementById("pageCounter");
			const zoomLabel = document.getElementById("zoomLabel");
			const textEditInput = document.getElementById("textEditInput");
			const selectionBox = document.getElementById("selectionBox");

			// State Variables
			let pdfDoc = null;
			let currentPage = 1;
			let currentTool = "pen";
			let annotations = []; // Stores all edits
			let isDrawing = false;
			let currentPath = [];
			let pdfFile = null;
			let zoom = 1.5;
			let startX, startY;

			// Event Listeners
			fileInput.addEventListener("change", handleFile);

			// Toolbar Selection
			toolbar.addEventListener("click", (e) => {
				if (e.target.dataset.tool) {
					document
						.querySelectorAll("[data-tool]")
						.forEach((b) => b.classList.remove("active"));
					e.target.classList.add("active");
					currentTool = e.target.dataset.tool;
				}
			});

			// File Handling
			async function handleFile(e) {
				const file = e.target.files[0];
				if (file && file.type === "application/pdf") {
					pdfFile = file;
					const url = URL.createObjectURL(file);
					try {
						const loadingTask = pdfjsLib.getDocument(url);
						pdfDoc = await loadingTask.promise;
						uploadContainer.classList.add("hidden");
						document.getElementById("app").classList.remove("hidden");
						document.getElementById("app").style.display = "flex";

						statusBar.innerText = `Loaded: ${file.name}`;
						await renderPage(1);
						buildThumbs();
						attachCanvasListeners();
					} catch (err) {
						console.error(err);
						statusBar.innerText = "Uplink failed. Corrupt file.";
					}
				}
			}

			// Rendering
			async function renderPage(pageNum = 1) {
				if (!pdfDoc) return;
				currentPage = pageNum;
				const page = await pdfDoc.getPage(pageNum);
				const viewport = page.getViewport({ scale: zoom });

				canvas.width = viewport.width;
				canvas.height = viewport.height;

				const renderContext = {
					canvasContext: ctx,
					viewport: viewport,
				};

				await page.render(renderContext).promise;
				drawSavedAnnotations();

				pageCounter.innerText = `PAGE ${currentPage} / ${pdfDoc.numPages}`;
			}

			function drawSavedAnnotations() {
				annotations
					.filter((a) => a.page === currentPage)
					.sort((a, b) => (a.type === "text" ? -1 : 1)) // Text on top
					.forEach((ann) => {
						if (ann.type === "text") {
							// Draw Background Mask
							if (ann.bg !== "transparent") {
								ctx.fillStyle = ann.bg === "white" ? "white" : "#050505"; // Dark mask for "match"
								ctx.fillRect(ann.x, ann.y, ann.w, ann.h);
							}
							// Draw Text
							ctx.fillStyle = ann.color;
							ctx.font = `${ann.size}px ${ann.font}`;
							ctx.textBaseline = "top";
							ctx.fillText(ann.text, ann.x + 5, ann.y + 5);
						} else if (ann.type === "pen" || ann.type === "highlight") {
							ctx.strokeStyle = ann.color;
							ctx.globalAlpha = ann.type === "highlight" ? 0.3 : 1;
							ctx.lineWidth = ann.type === "highlight" ? 20 : 2;
							ctx.beginPath();
							if (ann.path.length > 0) {
								ctx.moveTo(ann.path[0].x, ann.path[0].y);
								ann.path.forEach((p) => ctx.lineTo(p.x, p.y));
							}
							ctx.stroke();
							ctx.globalAlpha = 1;
						}
					});
			}

			// Canvas Interaction
			function attachCanvasListeners() {
				canvas.addEventListener("mousedown", startAction);
				canvas.addEventListener("mousemove", performAction);
				window.addEventListener("mouseup", endAction);
			}

			function startAction(e) {
				const rect = canvas.getBoundingClientRect();
				startX = e.clientX - rect.left;
				startY = e.clientY - rect.top;
				isDrawing = true;

				if (currentTool === "text" || currentTool === "replace") {
					selectionBox.classList.remove("hidden");
					selectionBox.style.left = startX + "px";
					selectionBox.style.top = startY + "px";
					selectionBox.style.width = "2px";
					selectionBox.style.height = "2px";
				} else {
					// Normalize coordinates to canvas resolution
					const scaleX = canvas.width / rect.width;
					const scaleY = canvas.height / rect.height;
					currentPath = [{ x: startX * scaleX, y: startY * scaleY }];
					ctx.beginPath();
					ctx.moveTo(startX * scaleX, startY * scaleY);
				}
			}

			function performAction(e) {
				if (!isDrawing) return;
				const rect = canvas.getBoundingClientRect();
				const curX = e.clientX - rect.left;
				const curY = e.clientY - rect.top;

				if (currentTool === "text" || currentTool === "replace") {
					const w = curX - startX;
					const h = curY - startY;
					selectionBox.style.width = Math.abs(w) + "px";
					selectionBox.style.height = Math.abs(h) + "px";
					selectionBox.style.left = (w > 0 ? startX : curX) + "px";
					selectionBox.style.top = (h > 0 ? startY : curY) + "px";
				} else {
					const scaleX = canvas.width / rect.width;
					const scaleY = canvas.height / rect.height;
					const canvasX = curX * scaleX;
					const canvasY = curY * scaleY;

					currentPath.push({ x: canvasX, y: canvasY });

					ctx.strokeStyle = colorPicker.value;
					ctx.lineWidth = currentTool === "highlight" ? 20 : 2;
					ctx.globalAlpha = currentTool === "highlight" ? 0.3 : 1;
					ctx.lineTo(canvasX, canvasY);
					ctx.stroke();
				}
			}

			async function endAction(e) {
				if (!isDrawing) return;
				isDrawing = false;
				const rect = canvas.getBoundingClientRect();
				const endX = e.clientX - rect.left;
				const endY = e.clientY - rect.top;

				if (currentTool === "text" || currentTool === "replace") {
					selectionBox.classList.add("hidden");
					const w = Math.abs(endX - startX);
					const h = Math.abs(endY - startY);

					if (w > 10 && h > 10) {
						const finalX = endX > startX ? startX : endX;
						const finalY = endY > startY ? startY : endY;

						openTextInput(
							finalX * (canvas.width / rect.width),
							finalY * (canvas.height / rect.height),
							w * (canvas.width / rect.width),
							h * (canvas.height / rect.height),
							finalX,
							finalY,
						);
					}
				} else {
					annotations.push({
						type: currentTool,
						page: currentPage,
						path: [...currentPath],
						color: colorPicker.value,
					});
					// Redraw to clear temporary drawing and save state
					renderPage(currentPage);
				}
			}

			function openTextInput(cx, cy, cw, ch, screenX, screenY) {
				const fontSize = parseInt(sizeInput.value);
				const padding = Math.max(8, fontSize * 0.5);
				const inputHeight = fontSize + padding * 2;

				textEditInput.classList.remove("hidden");
				textEditInput.style.left = screenX + "px";
				textEditInput.style.top = screenY + "px";
				textEditInput.style.width = Math.max(200, cw) + "px";
				textEditInput.style.height = inputHeight + "px";
				textEditInput.style.fontSize = fontSize + "px";
				textEditInput.style.fontFamily = fontInput.value;
				textEditInput.style.color = colorPicker.value;
				textEditInput.style.padding = padding + "px";
				textEditInput.style.background =
					bgType.value === "match"
						? "rgba(8, 8, 8, 0.8)"
						: bgType.value === "white"
							? "white"
							: "transparent";

				textEditInput.value = "";
				textEditInput.focus();

				// Key Handler
				const handleEnter = (e) => {
					if (e.key === "Enter") {
						if (textEditInput.value.trim()) {
							annotations.push({
								type: "text",
								page: currentPage,
								text: textEditInput.value,
								x: cx,
								y: cy,
								w: cw,
								h: ch,
								color: colorPicker.value,
								bg: bgType.value,
								size: parseInt(sizeInput.value),
								font: fontInput.value,
							});
							renderPage(currentPage);
							statusBar.innerText = `Text added: "${textEditInput.value}"`;
						}
						textEditInput.value = "";
						textEditInput.classList.add("hidden");
						document.removeEventListener("keydown", handleEnter);
					} else if (e.key === "Escape") {
						textEditInput.value = "";
						textEditInput.classList.add("hidden");
						document.removeEventListener("keydown", handleEnter);
					}
				};
				document.addEventListener("keydown", handleEnter);

				// Auto-resize height
				textEditInput.addEventListener("input", function () {
					this.style.height = "auto";
					this.style.height = this.scrollHeight + "px";
				});
			}

			// Zoom & Navigation
			function zoomIn() {
				zoom = Math.min(3, zoom + 0.25);
				zoomLabel.innerText = `${Math.round(zoom * 100)}%`;
				renderPage(currentPage);
			}
			function zoomOut() {
				zoom = Math.max(0.5, zoom - 0.25);
				zoomLabel.innerText = `${Math.round(zoom * 100)}%`;
				renderPage(currentPage);
			}
			function nextPage() {
				if (currentPage < pdfDoc.numPages) renderPage(currentPage + 1);
			}
			function prevPage() {
				if (currentPage > 1) renderPage(currentPage - 1);
			}

			// Actions
			undoBtn.onclick = () => {
				if (annotations.length > 0) {
					annotations.pop();
					renderPage(currentPage);
					statusBar.innerText = "Last edit removed.";
				}
			};

			clearBtn.onclick = () => {
				if (confirm("Clear all edits from this document?")) {
					annotations = [];
					renderPage(currentPage);
					statusBar.innerText = "All edits cleared.";
				}
			};

			function buildThumbs() {
				thumbList.innerHTML = "";
				for (let i = 1; i <= Math.min(pdfDoc.numPages, 10); i++) {
					const thumb = document.createElement("div");
					thumb.className = "thumb";
					thumb.innerText = i;
					thumb.onclick = () => renderPage(i);
					thumbList.appendChild(thumb);
				}
			}

			// Saving Logic
			saveBtn.onclick = async () => {
				if (!pdfFile) return;
				saveBtn.innerText = "SAVING...";

				try {
					const existingPdfBytes = await pdfFile.arrayBuffer();
					const pdfDocLib = await PDFLib.PDFDocument.load(existingPdfBytes);
					const pages = pdfDocLib.getPages();

					for (const ann of annotations) {
						const page = pages[ann.page - 1];
						const { width, height } = page.getSize();

						// Coordinate conversion: Canvas (Top-Left) -> PDF (Bottom-Left)
						const sX = width / canvas.width;
						const sY = height / canvas.height;

						if (ann.type === "text") {
							// Draw Background
							if (ann.bg !== "transparent") {
								page.drawRectangle({
									x: ann.x * sX,
									y: height - ann.y * sY - ann.h * sY,
									width: ann.w * sX,
									height: ann.h * sY,
									color:
										ann.bg === "white"
											? PDFLib.rgb(1, 1, 1)
											: PDFLib.rgb(0.02, 0.02, 0.02),
								});
							}
							// Draw Text
							page.drawText(ann.text, {
								x: (ann.x + 5) * sX,
								y: height - (ann.y + 5 + ann.size) * sY, // Adjust for baseline
								size: ann.size * sY,
								color: hexToRgb(ann.color),
								font: PDFLib.StandardFonts.Helvetica, // Simplified font handling
							});
						} else {
							// Draw Lines
							for (let i = 0; i < ann.path.length - 1; i++) {
								page.drawLine({
									start: {
										x: ann.path[i].x * sX,
										y: height - ann.path[i].y * sY,
									},
									end: {
										x: ann.path[i + 1].x * sX,
										y: height - ann.path[i + 1].y * sY,
									},
									thickness: (ann.type === "highlight" ? 15 : 2) * sY,
									color: hexToRgb(ann.color),
									opacity: ann.type === "highlight" ? 0.3 : 1,
								});
							}
						}
					}

					const pdfBytes = await pdfDocLib.save();
					const link = document.createElement("a");
					link.href = URL.createObjectURL(
						new Blob([pdfBytes], { type: "application/pdf" }),
					);
					link.download = `DTE_EDITED_${Date.now()}.pdf`;
					link.click();
					saveBtn.innerText = "💾 Save PDF";
					statusBar.innerText = "PDF saved successfully!";
				} catch (err) {
					console.error(err);
					saveBtn.innerText = "Error Saving";
					statusBar.innerText = "Save failed.";
				}
			};

			function hexToRgb(hex) {
				const r = parseInt(hex.slice(1, 3), 16) / 255;
				const g = parseInt(hex.slice(3, 5), 16) / 255;
				const b = parseInt(hex.slice(5, 7), 16) / 255;
				return PDFLib.rgb(r, g, b);
			}
		</script>
	</body>
